---
layout: default
---

<article class="post">
  <header class="post-header">
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y.%m.%d" }}</time>
      {%- for tag in page.tags -%}
        <span class="tag">{{ tag }}</span>
      {%- endfor -%}
    </div>
    <h1 class="post-title">{{ page.title }}</h1>
    {%- if page.subtitle -%}
      <p class="post-subtitle">{{ page.subtitle }}</p>
    {%- endif -%}
    {%- if page.tldr -%}
      <div class="tldr" role="note">
        <span class="tldr-label" aria-hidden="true">tl;dr</span>
        <p>{{ page.tldr }}</p>
      </div>
    {%- endif -%}
  </header>

  <div class="prose">
    {{ content }}
  </div>

  <footer class="post-footer">
    <a href="{{ '/' | append: page.category | relative_url }}" class="back-link">← back to {{ page.category }}</a>
  </footer>
</article>

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({
    startOnLoad: false,
    securityLevel: 'loose',
    theme: 'base',
    flowchart: { htmlLabels: true, curve: 'linear', useMaxWidth: true },
    themeVariables: {
      darkMode: true,
      background: '#0e0f09',
      primaryColor: '#14150e',
      primaryTextColor: '#e2ddcd',
      primaryBorderColor: '#767e22',
      lineColor: '#b3bd33',
      secondaryColor: '#1b1c13',
      tertiaryColor: '#14150e',
      clusterBkg: '#14150e',
      clusterBorder: '#2e3020',
      edgeLabelBackground: '#14150e',
      fontFamily: 'JetBrains Mono, monospace',
      fontSize: '14px'
    }
  });
  // kramdown renders ```mermaid as <pre><code class="language-mermaid">; turn those into
  // .mermaid divs (textContent decodes entities + keeps <br/> as literal text), then render.
  document.querySelectorAll('pre > code.language-mermaid, code.language-mermaid').forEach(code => {
    const pre = code.closest('pre') || code;
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = code.textContent;
    pre.replaceWith(div);
  });
  const run = () => mermaid.run({ querySelector: '.mermaid' });
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();
</script>
