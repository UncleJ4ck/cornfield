<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMax slice" role="img" aria-label="">
  <defs>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#cdd45a" stop-opacity="0.34"/>
      <stop offset="45%" stop-color="#9aa72e" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#9aa72e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#13160b"/>
      <stop offset="100%" stop-color="#080a05"/>
    </linearGradient>
  </defs>

  <!-- sickly moon haze behind the scarecrow -->
  <circle cx="720" cy="330" r="300" fill="url(#moon)"/>
  <circle cx="720" cy="318" r="74"  fill="#c4cf5b" opacity="0.10"/>

  <!-- distant crows drifting in the sky -->
  <g fill="none" stroke="#2a2d18" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <path d="M 250 180 q 16 -14 32 0 q 16 -14 32 0"/>
    <path d="M 360 230 q 12 -10 24 0 q 12 -10 24 0"/>
    <path d="M 1080 150 q 18 -15 36 0 q 18 -15 36 0"/>
    <path d="M 1180 215 q 13 -11 26 0 q 13 -11 26 0"/>
    <path d="M 940 110 q 11 -9 22 0 q 11 -9 22 0"/>
  </g>

  <!-- ground -->
  <path d="M0 720 Q 360 686 720 706 T 1440 716 V900 H0 Z" fill="url(#ground)"/>
  <path d="M0 772 Q 480 748 960 766 T 1440 772 V900 H0 Z" fill="#0a0c06"/>

  <!-- corn rows: thin tattered stalks across the field -->
  <g stroke="#23260f" stroke-width="2.4" stroke-linecap="round" opacity="0.8">
    <g>
      <line x1="60"  y1="740" x2="58"  y2="612"/><line x1="58" y1="660" x2="40" y2="632"/><line x1="58" y1="640" x2="76" y2="616"/>
      <line x1="130" y1="748" x2="134" y2="600"/><line x1="134" y1="650" x2="116" y2="624"/><line x1="134" y1="628" x2="152" y2="606"/>
      <line x1="205" y1="744" x2="201" y2="628"/><line x1="201" y1="668" x2="184" y2="646"/>
      <line x1="300" y1="752" x2="304" y2="590"/><line x1="304" y1="648" x2="286" y2="622"/><line x1="304" y1="626" x2="324" y2="602"/>
      <line x1="395" y1="746" x2="392" y2="624"/><line x1="392" y1="664" x2="375" y2="642"/>
      <line x1="500" y1="752" x2="504" y2="602"/><line x1="504" y1="652" x2="487" y2="628"/><line x1="504" y1="630" x2="523" y2="608"/>
      <line x1="600" y1="748" x2="597" y2="616"/><line x1="597" y1="660" x2="580" y2="638"/>
      <line x1="850" y1="748" x2="853" y2="612"/><line x1="853" y1="656" x2="836" y2="632"/><line x1="853" y1="636" x2="872" y2="612"/>
      <line x1="945" y1="752" x2="941" y2="598"/><line x1="941" y1="652" x2="924" y2="628"/>
      <line x1="1040" y1="746" x2="1044" y2="620"/><line x1="1044" y1="664" x2="1027" y2="642"/><line x1="1044" y1="642" x2="1063" y2="620"/>
      <line x1="1135" y1="752" x2="1131" y2="600"/><line x1="1131" y1="652" x2="1114" y2="628"/>
      <line x1="1230" y1="746" x2="1234" y2="624"/><line x1="1234" y1="666" x2="1217" y2="644"/><line x1="1234" y1="644" x2="1253" y2="622"/>
      <line x1="1320" y1="750" x2="1317" y2="610"/><line x1="1317" y1="656" x2="1300" y2="632"/>
      <line x1="1390" y1="748" x2="1393" y2="628"/><line x1="1393" y1="668" x2="1376" y2="646"/>
    </g>
  </g>

  <!-- the scarecrow -->
  <g stroke="#2b2e18" stroke-width="6" stroke-linecap="round" fill="#1c1f10">
    <!-- post -->
    <line x1="720" y1="372" x2="720" y2="724"/>
    <!-- crossbar arms -->
    <line x1="612" y1="452" x2="828" y2="452"/>
    <!-- straw hands -->
    <g stroke="#33371d" stroke-width="3">
      <line x1="612" y1="452" x2="596" y2="436"/><line x1="612" y1="452" x2="600" y2="468"/><line x1="612" y1="452" x2="592" y2="452"/>
      <line x1="828" y1="452" x2="844" y2="436"/><line x1="828" y1="452" x2="840" y2="468"/><line x1="828" y1="452" x2="848" y2="452"/>
    </g>
    <!-- tattered tunic -->
    <path d="M 662 452 L 778 452 L 792 612 L 760 596 L 742 624 L 720 600 L 698 624 L 680 596 L 648 612 Z" stroke-width="4"/>
    <!-- sack head -->
    <ellipse cx="720" cy="392" rx="34" ry="38" stroke-width="4"/>
    <!-- stitched eyes + mouth, faint toxin -->
    <g stroke="#aeb82e" stroke-width="3" opacity="0.5">
      <line x1="706" y1="388" x2="714" y2="392"/>
      <line x1="734" y1="388" x2="726" y2="392"/>
      <line x1="708" y1="408" x2="732" y2="408"/>
    </g>
    <!-- pointed hat -->
    <path d="M 686 372 L 720 322 L 754 372 Z" stroke-width="4"/>
    <line x1="676" y1="372" x2="764" y2="372" stroke-width="5"/>
  </g>

  <!-- a crow perched on the crossbar -->
  <g fill="#14160c" stroke="#14160c">
    <ellipse cx="820" cy="440" rx="9" ry="6"/>
    <path d="M 826 438 l 12 -3 -8 6 z"/>
    <line x1="818" y1="446" x2="818" y2="452" stroke-width="2"/>
  </g>
</svg>
